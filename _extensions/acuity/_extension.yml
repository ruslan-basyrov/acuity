title: Acuity
author: Ruslan Basyrov
version: 0.0.3
quarto-required: ">=1.8.0"
contributes:
  project:
    project:
      type: default
      output-dir: _acuity
  formats:
    html:
      grid:
        sidebar-width: 100px
        margin-width: 250px
        body-width: 650px
      toc: true
      toc-title: "Contents"
      toc-location: left
      reference-links: true
      reference-location: margin
      citation-location: margin

    typst:
      template-partials:
        - typst-template.typ
        - typst-show.typ
