title: Acuity
author: Ruslan Basyrov
version: 0.0.3
quarto-required: ">=1.8.0"
contributes:
  project:
    project:
      type: default
      output-dir: _acuity
  formats:
    html:
      filters:               
        - wideblock.lua
      grid:
        sidebar-width: 125px
        body-width: 725px
        margin-width: 325px
      toc: true
      toc-title: "Contents"
      toc-location: left
      reference-links: true
      reference-location: margin
      citation-location: margin

    typst:
      filters:
        - wideblock.lua
      template-partials:
        - typst-template.typ
        - typst-show.typ
