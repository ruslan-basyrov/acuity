title: Acuity
author: Ruslan Basyrov
version: 0.0.8
quarto-required: ">=1.8.0"
contributes:
  project:
    project:
      type: website
      output-dir: _acuity
  formats:
    html:
      filters:               
        - wideblock.lua
      grid:
        sidebar-width: 125px
        body-width: 725px
        margin-width: 325px
      toc: true
      toc-title: "Contents"
      toc-location: left
      reference-links: true
      reference-location: margin
      citation-location: margin
      cite-method: citeproc
      csl: custom.csl

    typst:
      filters:
        - wideblock.lua
      template-partials:
        - typst-template.typ
        - typst-show.typ
      # The CSL file is hardcoded in `typst-template.typ`
      # until this issue is resolved: https://github.com/quarto-dev/quarto-cli/issues/11552
      # csl: custom.csl
